        - heading "Договір публічної оферти" [level=1] [ref=e20]
        - generic [ref=e21]:
          - paragraph [ref=e22]:
            - strong [ref=e23]: ДОГОВІР ПУБЛІЧНОЇ ОФЕРТИ
            - text: про надання інформаційно-консультаційних послуг
          - paragraph [ref=e24]:
            - emphasis [ref=e25]: Редакція від 21 березня 2026 року
          - paragraph [ref=e26]: Цей Договір публічної оферти про надання інформаційно-консультаційних послуг (надалі — «Договір») є офіційною публічною пропозицією, яка регулює договірні відносини між Фізичною особою-підприємцем Максимчук Єгор Іванович (надалі — «Виконавець»), з будь-якою фізичною особою, яка має повну дієздатність (надалі — «Замовник»), на нижчевикладених умовах.
          - heading "1. Загальні положення" [level=2] [ref=e27]
          - paragraph [ref=e28]:
            - text: 1.1. Цей Договір є публічним Договором, що регулюється ст. 633, 634, 641, 642 Цивільного кодексу України. Розміщення тексту даного Договору в мережі Інтернет за адресою
            - link "https://qastudy.online/oferta" [ref=e29] [cursor=pointer]:
              - /url: https://qastudy.online/oferta
            - text: є публічною пропозицією укладення Договору на умовах, які в ньому викладені. Умови Договору встановлюються Виконавцем.
          - paragraph [ref=e30]: 1.2. Акцептом (прийняттям) цього Договору вважається заповнення Замовником форми реєстрації (Google Форма) та/або оплата Послуг будь-яким способом відповідно до ч. 2 ст. 642 Цивільного кодексу України. Частковий акцепт не допускається.
          - paragraph [ref=e31]: 1.3. Послуги, що надаються за цим Договором, є інформаційно-консультаційними послугами з питань інформатизації та регулюються Законом України «Про електронну комерцію». Послуги, що надаються за цим Договором, не є освітніми.
          - paragraph [ref=e32]: 1.4. Виконавець має право залучати до надання Послуг третіх осіб (спеціалістів), уповноважених організовувати та проводити надання Послуг.
          - paragraph [ref=e33]: 1.5. Цей Договір може бути змінений Виконавцем в односторонньому порядку. Зміни набирають чинності з моменту публікації нової редакції на Сайті.
          - heading "2. Терміни та визначення" [level=2] [ref=e34]
          - paragraph [ref=e35]:
            - text: 2.1. Сайт — веб-сторінка Виконавця в мережі Інтернет за адресою
            - link "https://qastudy.online/" [ref=e36] [cursor=pointer]:
              - /url: https://qastudy.online/
            - text: ", через яку здійснюється інформування про Послуги та надання Послуг Замовнику."
          - paragraph [ref=e37]: 2.2. Онлайн-курс — формат отримання знань та навичок, під час якого Замовник бере участь у живих онлайн-заняттях через платформу Zoom, переглядає записи занять, спілкується у закритому Telegram-чаті групи, виконує практичні завдання.
          - paragraph [ref=e38]: "2.3. Менторство — формат індивідуальної та/або групової підтримки Замовника після завершення Онлайн-курсу або незалежно від нього, що включає: ревью резюме та LinkedIn-профілю, доступ до закритого Telegram-чату з ментором, участь у групових Q&A сесіях (1–2 рази на місяць). Менторство надається на основі щомісячної підписки."
          - paragraph [ref=e39]: 2.4. Послуги — інформаційно-консультаційні послуги з питань інформатизації, що надаються Виконавцем у формі Онлайн-курсів та/або Менторства.
          - paragraph [ref=e40]: 2.5. Матеріали — електронні файли (відеозаписи занять, презентації, текстові матеріали, репозиторії з кодом, інфографіка), які надаються Замовнику в процесі надання Послуг.
          - paragraph [ref=e41]: "2.6. Сервіси — стороннє програмне забезпечення, яке використовує Виконавець для надання Послуг: Zoom, Telegram, WhatsApp, Viber, Signal, Google Forms, GitHub, YouTube."
          - paragraph [ref=e42]: 2.7. Запис — формалізована заявка на отримання Послуг, яку Замовник заповнює через Google Форму та/або прямий контакт з Виконавцем через месенджери (Telegram, WhatsApp, Viber, Signal).
          - heading "3. Предмет Договору" [level=2] [ref=e43]
          - paragraph [ref=e44]: 3.1. Виконавець зобов’язується надати Замовнику інформаційно-консультаційні Послуги з питань інформатизації у форматі Онлайн-курсів та/або Менторства, а Замовник зобов’язується прийняти та оплатити надані Послуги.
          - paragraph [ref=e45]: "3.2. Виконавець надає Послуги у двох форматах:"
          - paragraph [ref=e46]: 3.2.1. Онлайн-курси — живі онлайн-заняття (1–3 рази на тиждень) через платформу Zoom з наданням доступу до записів занять після їх проведення.
          - paragraph [ref=e47]: "3.2.2. Менторство та кар’єрний нагляд — щомісячна підписка, що включає: ревью резюме та LinkedIn-профілю, доступ до закритого Telegram-чату з ментором для консультацій, участь у групових Q&A сесіях (1–2 рази на місяць через Zoom)."
          - paragraph [ref=e48]: 3.3. Перелік Онлайн-курсів, їх вартість, тривалість та інша інформація розміщені на Сайті і можуть змінюватися Виконавцем.
          - heading "4. Порядок надання Послуг" [level=2] [ref=e49]
          - heading "4.1. Онлайн-курси" [level=3] [ref=e50]
          - paragraph [ref=e51]: 4.1.1. Замовник заповнює форму реєстрації (Google Форма), вказуючи ім’я, прізвище, номер телефону, електронну адресу, обраний курс.
          - paragraph [ref=e52]: 4.1.2. Виконавець зв’язується з Замовником через месенджер (Telegram, WhatsApp, Viber або Signal) для підтвердження запису та надання реквізитів для оплати.
          - paragraph [ref=e53]: 4.1.3. Після оплати Замовник додається до закритого Telegram-чату групи, де отримує доступ до матеріалів, розкладу занять та посилань на Zoom-конференції.
          - paragraph [ref=e54]: 4.1.4. Живі онлайн-заняття проводяться 1–3 рази на тиждень через Zoom. Графік занять повідомляється Замовнику після формування групи та може бути змінений Виконавцем з попереднім повідомленням у Telegram-чаті групи не пізніше ніж за 24 години.
          - paragraph [ref=e55]: 4.1.5. Записи занять надаються Замовнику після кожного заняття у Telegram-чаті групи.
          - paragraph [ref=e56]: 4.1.6. Telegram-чат групи залишається активним на весь період курсу та 2 (два) місяці після завершення курсу. Після цього терміну Виконавець має право архівувати чат.
          - paragraph [ref=e57]: 4.1.7. Доступ до записів занять надається на весь період курсу та 2 (два) місяці після завершення курсу.
          - heading "4.2. Менторство та кар’єрний нагляд" [level=3] [ref=e58]
          - paragraph [ref=e59]: 4.2.1. Менторство надається на основі щомісячної підписки. Замовник оплачує підписку щомісячно відповідно до вартості, зазначеної на Сайті.
          - paragraph [ref=e60]: 4.2.2. Менторство доступне для будь-якої фізичної особи, яка має повну дієздатність. Випускникам Онлайн-курсів Виконавця надається знижка, розмір якої зазначається на Сайті.
          - paragraph [ref=e61]: "4.2.3. Послуги Менторства включають:"
          - paragraph [ref=e62]: а) ревью резюме та LinkedIn-профілю Замовника з наданням рекомендацій щодо покращення;
          - paragraph [ref=e63]: б) доступ до закритого Telegram-чату з ментором для консультацій з питань кар’єрного розвитку, технічних питань та підготовки до співбесід;
          - paragraph [ref=e64]: в) участь у групових Q&A сесіях через Zoom (1–2 рази на місяць), де Замовник може ставити питання та отримувати відповіді від ментора.
          - paragraph [ref=e65]: 4.2.4. Підписка на Менторство активується з моменту зарахування оплати на рахунок Виконавця та діє протягом одного календарного місяця.
          - paragraph [ref=e66]: 4.2.5. Замовник може відмовитися від підписки в будь-який момент, повідомивши Виконавця в письмовій формі (через месенджер або email). Відмова набирає чинності з наступного розрахункового періоду. Кошти за поточний оплачений місяць не повертаються.
          - paragraph [ref=e67]: 4.2.6. Виконавець залишає за собою право змінювати склад послуг Менторства та їх вартість, попередивши Замовника не пізніше ніж за 14 (чотирнадцять) календарних днів до початку наступного розрахункового періоду.
          - heading "5. Вартість Послуг та порядок розрахунків" [level=2] [ref=e68]
          - paragraph [ref=e69]: 5.1. Вартість Послуг визначається для кожного Онлайн-курсу та для Менторства окремо та розміщується на Сайті. Вартість містить у собі податки.
          - paragraph [ref=e70]: 5.2. Оплата Онлайн-курсів здійснюється у вигляді 100% передоплати шляхом перерахування коштів на розрахунковий рахунок Виконавця за реквізитами, наданими після реєстрації.
          - paragraph [ref=e71]: 5.3. Оплата Менторства здійснюється щомісячно шляхом перерахування коштів на розрахунковий рахунок Виконавця до початку кожного розрахункового періоду.
          - paragraph [ref=e72]: 5.4. Виконавець може надати можливість розбити оплату Онлайн-курсу на кілька платежів за індивідуальною домовленістю.
          - paragraph [ref=e73]: 5.5. Комісію банку та/або платіжної системи Замовник сплачує самостійно.
          - paragraph [ref=e74]: "5.6. Повернення коштів за Онлайн-курси: Замовник має право на повернення 100% коштів, якщо письмово звернувся до Виконавця протягом 14 (чотирнадцяти) календарних днів з моменту оплати та до початку надання Послуг, відповідно до ст. 9 Закону України «Про захист прав споживачів». Повернення здійснюється протягом 14 (чотирнадцяти) банківських днів."
          - paragraph [ref=e75]: 5.7. Якщо Замовник відмовився від Послуг після початку курсу, кошти повертаються пропорційно невикористаним дням курсу за вирахуванням комісії банку та податку ФОП (5%).
          - paragraph [ref=e76]: "5.8. Повернення коштів за Менторство: кошти за поточний оплачений місяць підписки не повертаються. Замовник має право відмовитися від підписки на наступний розрахунковий період."
          - paragraph [ref=e77]: 5.9. Виконавець має право змінювати вартість Послуг шляхом оновлення інформації на Сайті. Зміна вартості не впливає на вже оплачені Послуги.
          - heading "6. Права та обов’язки Сторін" [level=2] [ref=e78]
          - heading "6.1. Виконавець зобов’язується:" [level=3] [ref=e79]
          - paragraph [ref=e80]: 6.1.1. Надавати Послуги якісно та відповідно до опису Онлайн-курсу / Менторства, розміщеного на Сайті.
          - paragraph [ref=e81]: 6.1.2. Забезпечити доступ до Zoom-конференцій, записів занять, навчальних матеріалів та Telegram-чатів.
          - paragraph [ref=e82]: 6.1.3. Не розголошувати персональні дані Замовника третім особам, окрім випадків, передбачених законодавством.
          - paragraph [ref=e83]: 6.1.4. Здійснювати повернення коштів відповідно до умов Договору.
          - paragraph [ref=e84]: 6.1.5. Проводити групові Q&A сесії в рамках Менторства не менше 1 (одного) разу на місяць.
          - heading "6.2. Замовник зобов’язується:" [level=3] [ref=e85]
          - paragraph [ref=e86]: 6.2.1. Надавати достовірні персональні дані при реєстрації.
          - paragraph [ref=e87]: 6.2.2. Своєчасно оплачувати Послуги.
          - paragraph [ref=e88]: 6.2.3. Не копіювати, не розповсюджувати та не продавати Матеріали курсу, включаючи записи занять, презентації та код.
          - paragraph [ref=e89]: 6.2.4. Дотримуватися правил поведінки у Telegram-чаті та на Zoom-заняттях (без реклами, нецензурної лайки, образ інших учасників).
          - paragraph [ref=e90]: 6.2.5. Не записувати заняття на аудіо- та/або відеоносії без письмового дозволу Виконавця.
          - heading "6.3. Виконавець має право:" [level=3] [ref=e91]
          - paragraph [ref=e92]: 6.3.1. Припинити надання Послуг без повернення коштів у разі порушення Замовником правил поведінки.
          - paragraph [ref=e93]: 6.3.2. Здійснювати запис проведених занять.
          - paragraph [ref=e94]: 6.3.3. Використовувати відгуки Замовника з маркетинговою метою.
          - paragraph [ref=e95]: 6.3.4. Призупинити доступ до Менторства у разі несвоєчасної оплати підписки.
          - heading "7. Інтелектуальна власність" [level=2] [ref=e96]
          - paragraph [ref=e97]: 7.1. Всі виключні права на Матеріали (відео, презентації, код, документацію) належать Виконавцю та захищені згідно з Законом України «Про авторське право і суміжні права».
          - paragraph [ref=e98]: 7.2. Замовник отримує обмежене право на використання Матеріалів виключно для особистого навчання. Передача прав третім особам заборонена.
          - paragraph [ref=e99]: 7.3. У разі порушення авторських прав Замовник несе відповідальність перед Виконавцем за завдані збитки, включаючи недоотриманий прибуток.
          - heading "8. Персональні дані" [level=2] [ref=e100]
          - paragraph [ref=e101]: 8.1. Акцептуючи цей Договір, Замовник надає згоду на обробку персональних даних відповідно до Закону України «Про захист персональних даних».
          - paragraph [ref=e102]: 8.2. Обробка персональних даних включає збір, зберігання та використання протягом дії Договору та 3 (трьох) років після його припинення.
          - paragraph [ref=e103]: 8.3. Виконавець не обробляє платіжні дані Замовника (реквізити банківських карток) на своїх ресурсах.
          - heading "9. Відповідальність" [level=2] [ref=e104]
          - paragraph [ref=e105]: 9.1. Сторони несуть відповідальність за невиконання або неналежне виконання зобов’язань відповідно до чинного законодавства України.
          - paragraph [ref=e106]: 9.2. Виконавець не несе відповідальності за якість інтернет-з’єднання Замовника та роботу сторонніх Сервісів (Zoom, Telegram, YouTube тощо).
          - paragraph [ref=e107]: 9.3. Загальна відповідальність Виконавця обмежується сумою фактично сплачених Замовником коштів за Послуги.
          - paragraph [ref=e108]: 9.4. Виконавець не гарантує конкретних результатів працевлаштування або кар’єрного просування в результаті Менторства. Такі послуги мають інформаційно-консультаційний характер.
          - heading "10. Форс-мажор" [level=2] [ref=e109]
          - paragraph [ref=e110]: 10.1. Сторони звільняються від відповідальності за невиконання зобов’язань, якщо воно стало наслідком обставин непереборної сили (пожежа, повінь, воєнні дії, карантин, стихійне лихо тощо).
          - paragraph [ref=e111]: 10.2. Сторона, яка не може виконати зобов’язання, повинна повідомити іншу Сторону протягом 10 (десяти) календарних днів.
          - paragraph [ref=e112]: 10.3. Якщо форс-мажор триває понад 3 (три) місяці, кожна Сторона має право розірвати Договір.
          - heading "11. Вирішення спорів" [level=2] [ref=e113]
          - paragraph [ref=e114]: 11.1. Сторони вирішують спори шляхом переговорів. Претензія направляється на електронну пошту Виконавця. Термін відповіді на претензію — 10 (десять) календарних днів.
          - paragraph [ref=e115]: 11.2. Якщо спір не вирішено шляхом переговорів, він підлягає розгляду відповідно до чинного законодавства України.
          - heading "12. Строк дії оферти" [level=2] [ref=e116]
          - paragraph [ref=e117]: 12.1. Оферта діє з моменту розміщення на Сайті до моменту її відкликання або заміни новою редакцією.
          - paragraph [ref=e118]: 12.2. Договір з конкретним Замовником діє до повного виконання зобов’язань обома Сторонами. Для підписки на Менторство — до моменту відмови Замовника від підписки або припинення надання Послуг Виконавцем.
          - heading "13. Реквізити Виконавця" [level=2] [ref=e119]
