        - separator [ref=e150]
        - heading "Заняття 12. Tool call testing і MCP" [level=3] [ref=e151]
        - paragraph [ref=e152]: "Основи tool call testing: правильний інструмент, правильні параметри, правильний порядок. Playwright MCP як об’єкт тестування і як інструмент тестування. Програмний перехоплення і перевірка tool call. Типові баги: зайві виклики, пропущені виклики, неправильні параметри."
        - paragraph [ref=e153]:
          - strong [ref=e154]: "Практика на занятті:"
          - text: студенти запускають готового агента з Playwright MCP, спостерігають tool call у trace, знаходять один неправильний виклик у підготовленому сценарії й пишуть assertion, щоб ловити його автоматично.
        - paragraph [ref=e155]:
          - strong [ref=e156]: "ДЗ:"
          - text: "написати автоматизовані тести поведінки tool call — мінімум 5 тест-кейсів: правильний виклик, виклик з неправильними параметрами, пропущений виклик, зайвий виклик, неправильний порядок. Здати: код + результати запуску."
        - paragraph [ref=e157]:
          - strong [ref=e158]: "Результат:"
