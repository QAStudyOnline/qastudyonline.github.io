          - strong [ref=e195]: "ДЗ:"
          - text: "довести eval-suite до CI/CD-пайплайну з мінімум двома quality gate — один rule-based (метрика DeepEval), один model-based (LLM judge). Здати: репозиторій + скриншот зеленого ранy + скриншот заблокованого ранy (симульована регресія) + пояснення логіки порогів."
