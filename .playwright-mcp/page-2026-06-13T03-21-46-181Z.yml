        - separator [ref=e159]
        - heading "Заняття 13. Observability і cost testing" [level=3] [ref=e160]
        - paragraph [ref=e161]: "Навіщо QA трасування агента. LangSmith і Phoenix/Arize: що вони показують і як їх читати. Що шукати у trace: аномалії latency, token loops, неочікувані tool call, деградація якості. Cost testing: виявлення дорогих сценаріїв. Метрики production-моніторингу."
        - paragraph [ref=e162]:
          - strong [ref=e163]: "Практика на занятті:"
          - text: "студенти під’єднують LangSmith до демо-агента й запускають сценарій із навмисним token loop. Завдання: знайти аномалію у trace, визначити хибний крок, порахувати вартість провального сценарію проти нормального."
        - paragraph [ref=e164]:
          - strong [ref=e165]: "ДЗ:"
          - text: "налаштувати observability для демо-агента. Прогнати 5 сценаріїв, порівнявши latency, токени, вартість, кількість tool call. Знайти найдорожчий сценарій. Здати: скриншоти trace + порівняльна таблиця + рекомендація з оптимізації."
        - paragraph [ref=e166]:
          - strong [ref=e167]: "Результат:"
          - text: студенти налаштовують трасування агентних систем і знаходять аномалії поведінки й вартості через observability-інструменти.
        - separator [ref=e168]
        - heading "Заняття 14. AI-assisted Test Case Generation і Code Review" [level=3] [ref=e169]
        - paragraph [ref=e170]: "Використання AI для генерації тест-кейсів — і валідація їхньої якості. Патерни: генерація з вимог, генерація з коду, генерація edge cases з golden dataset. GitHub Copilot і Claude як асистенти тест-дизайну. AI-assisted code review для тестового коду: промптити модель шукати слабкі assertion і неповні тести. Ризики надмірної довіри до AI-згенерованих тестів: false coverage, неявні припущення. Валідація якості згенерованих тестів."
        - paragraph [ref=e171]:
          - strong [ref=e172]: "Практика на занятті:"
          - text: "студенти просять AI згенерувати тест-кейси для функціональності агента. Завдання: критично оцінити результат — знайти тести, що виглядають правильними, але нічого не перевіряють, і переписати їх."
        - paragraph [ref=e173]:
          - strong [ref=e174]: "ДЗ:"
          - text: "згенерувати тест-кейси для обраного компонента, використовуючи інтегрованого в пайплайн AI-агента, провести ручний review. Здати: GitHub-репозиторій з оригінальними тестами + коментарі review. Виконання як частина локального agentic workflow."
