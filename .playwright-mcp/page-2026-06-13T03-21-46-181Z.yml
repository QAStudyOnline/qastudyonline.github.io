        - separator [ref=e35]
        - heading "Блок 1. Фундамент" [level=2] [ref=e36]
        - paragraph [ref=e37]:
          - emphasis [ref=e38]: (Заняття 1–2 — базовий рівень, без технічних передумов)
        - 'heading "Заняття 1. AI-системи як об’єкт тестування: чому все інакше" [level=3] [ref=e39]'
        - paragraph [ref=e40]: "Розуміння того, чим тестування LLM відрізняється від традиційного детермінованого ПЗ. Огляд типів систем, які трапляються в проєктах: чат-боти, RAG-системи, агенти і пайплайни. Дослідження режимів відмов через практичну таксономію, а не теорію ML. Як класична піраміда тестування трансформується для AI-застосунків, де eval-тестування стає новим шаром між інтеграційним і E2E."
        - paragraph [ref=e41]:
          - strong [ref=e42]: "Практика на занятті:"
          - text: студенти отримують демо-чат-бот і 10 різних промптів; завдання — класифікувати відмови за таксономією і задокументувати їх у форматі «структурований баг-репорт для LLM-системи».
        - paragraph [ref=e43]:
          - strong [ref=e44]: "ДЗ:"
          - text: "знайти 5 справжніх відмов у будь-якому публічному AI-продукті й задокументувати їх з категоризацією: тип відмови → вхід → фактичний результат → очікуваний результат → severity."
        - paragraph [ref=e45]:
          - strong [ref=e46]: "Результат:"
          - text: студенти розуміють специфіку тестування AI-систем, уміють документувати відмови у структурованому форматі й бачать, як піраміда тестування змінюється в AI-контексті.
        - separator [ref=e47]
        - heading "Заняття 2. Архітектура агентних систем очима QA" [level=3] [ref=e48]
        - paragraph [ref=e49]: "Фокус на точках відмови, а не на побудові агентів. Компоненти: LLM-ядро, системний промпт, інструменти, пам’ять, оркестрація, контекстне вікно. Що відбувається під час tool call і де лежать шари ризику. Як перетворити архітектурну діаграму на тест-стратегію."
        - paragraph [ref=e50]:
          - strong [ref=e51]: "Практика на занятті:"
          - text: "студенти отримують схему реальної агентної системи (RAG-агент із двома tool call) і будують risk map: визначають типи ризиків і мінімум одну тест-ідею на кожен компонент."
        - paragraph [ref=e52]:
          - strong [ref=e53]: "ДЗ:"
          - text: "намалювати архітектурну діаграму AI-системи зі свого проєкту або вигадану. Дати мінімум 2 тест-ідеї на компонент. Здати: діаграма + таблиця ризиків."
        - paragraph [ref=e54]:
          - strong [ref=e55]: "Результат:"
          - text: студенти декомпозують агентні системи на компоненти й будують risk map як основу тест-стратегії.
        - separator [ref=e56]
        - heading "Блок 2. Тестування LLM" [level=2] [ref=e57]
        - paragraph [ref=e58]:
          - emphasis [ref=e59]: (Заняття 3–9 — середній рівень, потрібен базовий Python або TypeScript)
        - heading "Заняття 3. Промпт та контекст інжиніринг для QA" [level=3] [ref=e60]
        - paragraph [ref=e61]: "Навіщо QA-інженеру розуміти prompt engineering — не щоб писати промпти, а щоб їх тестувати. Анатомія системного промпту: інструкції, персона, обмеження, приклади, формат виводу. Типи промптів: zero-shot, few-shot, chain-of-thought, ReAct, self-consistency — кожен ламається по-своєму. Техніки: role prompting, покрокова декомпозиція, специфікація формату виводу, negative prompting. Контекстне вікно як ресурс і як його розмір впливає на поведінку агента. Context injection і вплив зовнішніх даних на відповіді моделі."
        - paragraph [ref=e62]:
          - strong [ref=e63]: "Практика на занятті:"
          - text: студенти отримують промпти різних типів для однієї задачі, запускають кожен на підготовлених даних, порівнюють результати й знаходять, де саме кожна техніка дає збій.
        - paragraph [ref=e64]:
          - strong [ref=e65]: "ДЗ:"
          - text: "провести аудит реального або вигаданого системного промпту: знайти 3+ проблемні місця (неоднозначності, конфлікти, прогалини в інструкціях). Переписати з використанням мінімум двох технік. Здати: оригінал + анотований аудит + покращена версія з поясненнями."
        - paragraph [ref=e66]:
          - strong [ref=e67]: "Результат:"
          - text: студенти розуміють типи й техніки промптів, бачать їхній вплив на поведінку моделі й уміють проводити структурований QA-аудит системного промпту.
        - separator [ref=e68]
        - heading "Заняття 4. Метрики в тестуванні ШІ" [level=3] [ref=e69]
        - paragraph [ref=e70]: "Чому pass/fail не працює для LLM-систем. Огляд ключових метрик: faithfulness, answer relevancy, context recall, hallucination rate, groundedness. Різниця між кількісними і якісними метриками і коли яку застосовувати. Підбір метрик під тип системи: чат-боти, RAG, агенти, пайплайни. Baseline-метрики і що таке «хороший» результат. Як метрики змінюються зі зміною моделі, промпту чи даних."
        - paragraph [ref=e71]:
          - strong [ref=e72]: "Практика на занятті:"
          - text: студенти інтерпретують результати eval-ранів з кількома метриками, визначають слабкі місця системи і формулюють конкретні гіпотези щодо поведінки метрик.
        - paragraph [ref=e73]:
          - strong [ref=e74]: "ДЗ:"
          - text: "обрати AI-систему і скласти таблицю: релевантні метрики → обґрунтування → порогові значення прийнятного результату. Здати: таблиця метрик + обґрунтування."
        - paragraph [ref=e75]:
          - strong [ref=e76]: "Результат:"
          - text: студенти вміють обирати відповідні метрики для різних AI-систем і розуміють, що вони вимірюють та їхні обмеження.
        - separator [ref=e77]
        - 'heading "Заняття 5. Тестування промптів: від ручних перевірок до автоматизації" [level=3] [ref=e78]'
        - paragraph [ref=e79]: "Чому ручна перевірка промптів не масштабується. Побудова golden dataset: джерела, розмір, баланс кейсів. Критерії вибору між DeepEval і Promptfoo. Написання assertion для недетермінованих відповідей. Версіонування промптів як інженерна практика — чому зміна промпту це реліз. Регресійне тестування для порівняння версії A проти B на однакових даних."
        - paragraph [ref=e80]:
          - strong [ref=e81]: "Практика на занятті:"
          - text: студенти запускають готовий eval-suite з 5 тестами в DeepEval, аналізують, які тести «пливуть», і доопрацьовують assertion, щоб прибрати false positives.
        - paragraph [ref=e82]:
          - strong [ref=e83]: "ДЗ:"
          - text: "взяти реальний або вигаданий промпт. Скласти golden dataset з 10 прикладів input/expected-output. Створити й запустити eval-suite. Здати: код + результати + короткий аналіз знахідок."
        - paragraph [ref=e84]:
          - strong [ref=e85]: "Результат:"
          - text: студенти будують golden dataset і запускають eval-suite через DeepEval або Promptfoo замість ручної перевірки.
        - separator [ref=e86]
        - 'heading "Заняття 6. Тестування RAG: hallucination, faithfulness, relevancy" [level=3] [ref=e87]'
        - paragraph [ref=e88]: "Де виникають проблеми RAG-пайплайну: retrieval, augmentation, generation. Метрики RAGAS: faithfulness, answer relevancy, context recall. Знайомство з патерном LLM-as-judge — коли і як його застосовувати. Як відрізнити галюцинацію від неповного контексту. Розбір реального production-кейсу з галюцинацією."
        - paragraph [ref=e89]:
          - strong [ref=e90]: "Практика на занятті:"
          - text: студенти розгортають демо-RAG-систему й запускають RAGAS-оцінку на підготовлених питаннях, аналізуючи низькі faithfulness-скори і випадки вигадування.
        - paragraph [ref=e91]:
          - strong [ref=e92]: "ДЗ:"
          - text: "побудувати мінімальний RAG eval: будь-яка документація → демо-RAG → 10 питань з відомими відповідями → RAGAS. Здати: метрики + висновок щодо слабких місць + одна конкретна рекомендація з покращення."
        - paragraph [ref=e93]:
          - strong [ref=e94]: "Результат:"
          - text: студенти розуміють специфіку тестування RAG і вміють вимірювати якість відповідей через метрики RAGAS.
        - separator [ref=e95]
        - heading "Заняття 7. Тестування багатокрокових діалогів і context management" [level=3] [ref=e96]
        - paragraph [ref=e97]: "Де агенти втрачають контекст і чому. Патерни context failure: суперечності між кроками, забуті важливі дані, деградація на довгому діалозі. Програмна симуляція багатокрокових сценаріїв. Ліміти контекстного вікна як джерело багів."
        - paragraph [ref=e98]:
          - strong [ref=e99]: "Практика на занятті:"
          - text: студенти проганяють support-агента через 8-кроковий сценарій, знаходять мінімум 2 місця, де контекст втрачається або з’являються суперечності, і пишуть тест-кейси на знайдені проблеми.
        - paragraph [ref=e100]:
          - strong [ref=e101]: "ДЗ:"
          - text: "написати повний тест-план для багатокрокового сценарію: 3 happy paths, 3 edge cases з context failures, 2 adversarial-сценарії. Для кожного: вхід → очікуваний результат → критерії pass/fail."
        - paragraph [ref=e102]:
          - strong [ref=e103]: "Результат:"
          - text: студенти проєктують тест-сценарії багатокрокових діалогів і знаходять context failures на різних етапах.
        - separator [ref=e104]
        - heading "Заняття 8. Тестування різних моделей і GitHub Models" [level=3] [ref=e105]
        - paragraph [ref=e106]: "Моделі — не константа. Однакові системи поводяться по-різному на GPT-4o, Claude Sonnet, Gemini, Llama. Що змінюється: чутливість до temperature, дотримання інструкцій, консистентність виводу, рівень галюцинацій. GitHub Models для порівняльного тестування: швидкий доступ до кількох провайдерів без окремих API-ключів. Стратегія бенчмаркінгу моделей і її автоматизація. Коли і навіщо змінювати модель у production."
        - paragraph [ref=e107]:
          - strong [ref=e108]: "Практика на занятті:"
          - text: студенти запускають однаковий eval-suite на двох різних моделях через GitHub Models, порівнюють результати, виявляють істотні відмінності в поведінці й рекомендують, яка модель підходить під use case.
        - paragraph [ref=e109]:
          - strong [ref=e110]: "ДЗ:"
          - text: "побудувати звіт порівняння моделей: прогнати golden dataset на 3+ моделях, задокументувати метрики, вартість і latency. Здати: порівняльна таблиця + обґрунтована рекомендація."
        - paragraph [ref=e111]:
          - strong [ref=e112]: "Результат:"
          - text: студенти порівнюють поведінку моделей через eval-suite і дають обґрунтовані рекомендації щодо вибору моделі.
        - separator [ref=e113]
        - 'heading "Заняття 9. Локальні моделі для тестування: Ollama і Lemonade AI Runtime" [level=3] [ref=e114]'
        - paragraph [ref=e115]: "Чому вартість LLM-as-a-Judge стає проблемною на масштабі CI/CD: «$0.003 за judge-виклик × 500 тестів × 10 PR/день = реальний бюджет». Локальні моделі розв’язують це: нульова вартість за виклик, повна приватність, відсутність rate-лімітів і мережевих залежностей. Огляд Ollama: підтримувані моделі (Llama 3, Mistral, Phi-3, Gemma 2, Qwen). Lemonade AI Runtime як альтернатива з акцентом на Windows і NPU-прискорення. Вибір локальної моделі: розмір RAM, якість суджень і швидкість — компроміси. Де локальних моделей достатньо для judge, а де потрібен cloud."
        - paragraph [ref=e116]:
          - strong [ref=e117]: "Стратегія вибору judge:"
        - list [ref=e118]:
          - listitem [ref=e119]: Локальна розробка → Ollama + Phi-3 Mini (3.8B) — працює на ноутбуці, відповідь 2–5 сек
          - listitem [ref=e120]: CI на GitHub Actions → Ollama + Llama 3.1 8B у Docker — безкоштовно, без секретів
          - listitem [ref=e121]: Pre-release gate → Claude Haiku або GPT-4o Mini — вища якість суджень
          - listitem [ref=e122]: Регресійні тести (500+) → локальна модель — cloud-витрати неприйнятні
        - paragraph [ref=e123]:
          - strong [ref=e124]: "Практика на занятті:"
          - text: інструктор наживо демонструє розгортання Ollama і налаштування Lemonade runtime, під’єднує до DeepEval через custom model wrapper, запускає eval-suite спершу з cloud-моделлю як judge, потім із локальною, порівнює результати й вартість.
        - paragraph [ref=e125]:
          - strong [ref=e126]: "ДЗ:"
          - text: "розгорнути Ollama локально й інтегрувати як judge в eval-suite. Прогнати тести в трьох конфігураціях: cloud-модель, велика модель Ollama (7B+), мала модель Ollama (3B або менше). Здати: таблиця accuracy/latency/cost + висновок щодо оптимальної конфігурації на кожному етапі пайплайну."
        - paragraph [ref=e127]:
          - strong [ref=e128]: "Результат:"
          - text: студенти розгортають локальні моделі через Ollama або Lemonade, інтегрують їх як judge у DeepEval і свідомо обирають між локальним і cloud-judge.
        - separator [ref=e129]
        - heading "Блок 3. Agentic Testing" [level=2] [ref=e130]
        - paragraph [ref=e131]:
          - emphasis [ref=e132]: (Заняття 10–14 — середній рівень, потрібен досвід роботи з API і базова автоматизація)
        - 'heading "Заняття 10. LLM as a Judge: імплементація і підводні камені" [level=3] [ref=e133]'
        - paragraph [ref=e134]: "LLM-as-a-Judge сьогодні — стандарт в оцінюванні AI. Архітектура: вибір промпту, вибір моделі, формат відповіді. Коли judge надійний, а коли вводить в оману: positional bias, verbosity bias, self-preference. Калібрування judge: валідація людиною, inter-rater agreement, тюнінг промпту. Імплементація через DeepEval і RAGAS. Коли LLM-judge замінює людину, а коли доповнює. Вартість і latency для CI."
        - paragraph [ref=e135]:
          - strong [ref=e136]: "Практика на занятті:"
          - text: студенти пишуть власні judge-промпти для відповідей демо-агента, порівнюють з ground truth, знаходять помилки judge і доопрацьовують промпти, щоб зменшити хибні оцінки.
        - paragraph [ref=e137]:
          - strong [ref=e138]: "ДЗ:"
          - text: "імплементувати LLM-as-a-Judge для власної системи: написати judge-промпт, прогнати на 10 прикладах, вручну провалідувати всі 10, порахувати точність judge. Здати: промпт + результати + аналіз відмов judge."
        - paragraph [ref=e139]:
          - strong [ref=e140]: "Результат:"
          - text: студенти імплементують і налаштовують патерн LLM-as-a-Judge і розуміють його обмеження.
        - separator [ref=e141]
        - 'heading "Заняття 11. Security testing: Prompt Injection і Red Teaming" [level=3] [ref=e142]'
        - paragraph [ref=e143]: "OWASP LLM Top 10 як практичний чекліст. Пряма prompt injection: перезапис інструкцій. Непряма injection: атаки через зовнішній контент (документи, сторінки, результати інструментів). Методи jailbreaking і захист. Ексфільтрація даних через агентів. Як системний промпт і context engineering формують поверхню атаки. Методологія red team-сесії: структура, документування, пріоритизація."
        - paragraph [ref=e144]:
          - strong [ref=e145]: "Практика на занятті:"
          - text: "студенти отримують демо-агента з навмисними вразливостями. Мета: за 30 хвилин знайти мінімум 2 вразливості різних типів з OWASP LLM Top 10 і задокументувати їх у форматі security report."
        - paragraph [ref=e146]:
          - strong [ref=e147]: "ДЗ:"
