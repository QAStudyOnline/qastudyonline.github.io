        - separator [ref=e189]
        - 'heading "Заняття 16. Eval pipeline у CI/CD: Quality Gates з DeepEval і LLM-as-a-Judge" [level=3] [ref=e190]'
        - paragraph [ref=e191]: "Чому eval має місце в release-пайплайнах — стандартних unit-test gate недостатньо для AI-систем. Архітектура quality gate: що перевіряти, з якою частотою, що блокує деплой. GitHub Actions + DeepEval: покрокове налаштування з нуля. LLM-as-a-Judge як автоматичний gate без участі людини. Benchmark-пороги: встановлення baseline-метрик і коли їх переглядати. Симуляція регресії від зміни промпту для перевірки ефективності gate. Причини flaky eval і розв’язки: seed, retry logic, threshold bands. Звітування результатів eval у pull request: annotations, summary comments, Slack-сповіщення."
