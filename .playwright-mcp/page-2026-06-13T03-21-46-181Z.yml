        - paragraph [ref=e182]: "Чим AI-тест-фреймворки відрізняються від стандартних фреймворків автоматизації. Ключові компоненти: dataset management, eval runner, assertion engine, result storage, reporting. Проєктування фреймворків, що підтримують unit-рівень eval і E2E-тестування агентів. Патерни: LLM response fixtures, golden dataset factories, model wrappers. Версіонування тестів разом із версіонуванням промптів. Портативність фреймворку між провайдерами (OpenAI, Anthropic, локальні моделі)."
