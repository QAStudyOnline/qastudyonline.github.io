        - paragraph [ref=e293]: "Профіль: відповідає за загальну якість продукту. Команда вже будує або планує LLM-фічі. Розуміє загальну картину, але не має структурованого AI QA-фреймворку. JTBD: «Ми запускаємо AI-фічі, але я не розумію забезпечення якості. Боюся production-інцидентів і не знаю, що питати, щоб перевірити тестування. Хочу структуру й упевненість»."
