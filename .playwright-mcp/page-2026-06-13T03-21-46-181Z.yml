        - paragraph [ref=e185]:
          - strong [ref=e186]: "ДЗ:"
          - text: "спроєктувати й імплементувати мінімальний AI-тест-фреймворк для обраної системи. Мінімальні вимоги: завантаження датасету, виконання eval, збереження результатів, базовий reporting. Здати: репозиторій + README + приклад запуску."
