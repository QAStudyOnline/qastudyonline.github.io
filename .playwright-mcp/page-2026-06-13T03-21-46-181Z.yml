        - paragraph [ref=e203]: "Agentic workflows відрізняються від eval gate: агенти діють, а не лише перевіряють. Патерни використання: автоматичний code review через GitHub Copilot або Claude Code в PR, автоматична генерація чи оновлення тестів при зміні коду, автоматичне оновлення документації при зміні промпту чи специфікації. Імплементація через GitHub Actions + MCP: надання агентам доступу до репозиторію з контролем можливостей. Claude Code і GitHub Copilot як агенти пайплайну: де кожен сильніший. Валідація якості роботи агента: validation gate після дій агента. Ризики agentic CI/CD: нескінченні цикли, технічний борг від низькоякісної генерації, надмірні дозволи."
