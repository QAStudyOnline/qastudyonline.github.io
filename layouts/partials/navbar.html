<nav class="navbar">
  <div class="container">
    <div class="d-flex justify-between align-center py-4">
      <a href="{{ "/" | relLangURL }}" class="navbar-brand">
        {{ .Site.Params.brand_name }}
      </a>

      <ul class="navbar-nav">
        {{ range .Site.Menus.main }}
        <li class="nav-item{{ if .HasChildren }} dropdown{{ end }}">
          <a href="{{ .URL }}" class="nav-link">
            {{ .Name }}
            {{ if .HasChildren }}
            <svg class="icon ml-1" fill="currentColor" viewBox="0 0 20 20" width="16" height="16">
              <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path>
            </svg>
            {{ end }}
          </a>
          {{ if .HasChildren }}
          <div class="dropdown-menu">
            {{ range .Children }}
            <a href="{{ .URL }}" class="dropdown-item">{{ .Name }}</a>
            {{ end }}
          </div>
          {{ end }}
        </li>
        {{ end }}
      </ul>

      <div class="navbar-actions">
        <a href="{{ "/courses/" | relLangURL }}" class="btn btn-primary">{{ i18n "nav_get_started" }}</a>

        <button class="mobile-menu-toggle" aria-label="Toggle mobile menu">
          <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </button>
      </div>
    </div>
  </div>
</nav>
