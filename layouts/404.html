{{ define "main" }}
<style>
  .error-page {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 1rem;
  }
  .error-code {
    font-size: 8rem;
    font-weight: 900;
    color: #7c3aed;
    line-height: 1;
    margin-bottom: 1rem;
  }
  .error-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #111827;
    margin-bottom: 1rem;
  }
  .error-description {
    color: #6b7280;
    margin-bottom: 2rem;
    max-width: 30rem;
    margin-left: auto;
    margin-right: auto;
  }
  .error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
<div class="error-page">
  <div>
    <div class="error-code">404</div>
    <h1 class="error-title">Сторінку не знайдено</h1>
    <p class="error-description">
      Вибачте, сторінку, яку ви шукаєте, не існує або була переміщена.
    </p>
    <div class="error-actions">
      <a href="{{ "/" | relLangURL }}" class="btn btn-primary btn-lg">
        На головну
      </a>
      <a href="{{ "/courses/" | relLangURL }}" class="btn btn-secondary btn-lg">
        Переглянути курси
      </a>
    </div>
  </div>
</div>
{{ end }}
